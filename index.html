<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#F0E6CF" />
    <meta name="format-detection" content="telephone=no" />
    <title>Batch Cook</title>

    <!-- Fonts: Fraunces (display, with SOFT axis) + DM Sans (UI) + DM Mono (captions) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500;1,9..144,600&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Design system (order matters: tokens → base → components → screens) -->
    <link rel="stylesheet" href="/src/styles/tokens.css" />
    <link rel="stylesheet" href="/src/styles/base.css" />
    <link rel="stylesheet" href="/src/styles/components.css" />
    <link rel="stylesheet" href="/src/styles/screens.css" />

    <!-- Iconify · streamline-emojis (food, hand-painted) + iconoir (UI line)
         Loads the <iconify-icon> web component. Icons resolve lazily from CDN. -->
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  </head>
  <body>
    <!-- Painted-edge SVG filter library · used by .btn, .chip, .fab, .day-pill, .banner
         via filter: url(#paint-edge). 1×1 transparent so build pipelines don't strip it. -->
    <svg xmlns="http://www.w3.org/2000/svg" width="1" height="1" viewBox="0 0 1 1"
         style="position:fixed;bottom:-1px;right:-1px;width:1px;height:1px;pointer-events:none;opacity:0"
         aria-hidden="true">
      <defs>
        <filter id="paint-edge" x="-5%" y="-5%" width="110%" height="110%">
          <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="3" result="noise"/>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.1"/>
        </filter>
        <filter id="paint-edge-soft" x="-3%" y="-3%" width="106%" height="106%">
          <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" seed="7" result="noise"/>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.3"/>
        </filter>
        <filter id="paint-edge-icon" x="-10%" y="-10%" width="120%" height="120%">
          <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" seed="5" result="noise"/>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.7"/>
        </filter>
      </defs>
      <rect width="1" height="1" fill="transparent"/>
    </svg>

    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
